name: Build and Deploy to App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd web
          npm ci

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Copy frontend build to static/
        run: |
          mkdir -p static
          cp -r web/dist/* static/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E4C4A364847749A6AD6322E92E0BC195 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8EE24AB74B6F4F9DB8156F19D3827F6E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5B5DBA52E1624F41AA812BFD64B8B490 }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'options-analyzer-api'
          slot-name: 'Production'
          package: .
