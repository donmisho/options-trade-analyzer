name: Build on push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verify Alembic migration accompanies any database.py change
        run: |
          # Escape hatch: a commit that only touches non-schema content in
          # database.py (docstrings, comments, type-only edits) may bypass the
          # gate by including [skip-migration] in its message. Use sparingly —
          # any real ORM/schema change still requires an Alembic revision.
          MSG=$(git log -1 --format=%B)
          if echo "$MSG" | grep -qF '[skip-migration]'; then
            echo "[skip-migration] marker present in HEAD commit message; bypassing Alembic gate."
            exit 0
          fi
          DB_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -c "app/models/database.py" || true)
          MIGRATION_ADDED=$(git diff --name-only HEAD~1 HEAD | grep -c "^alembic/versions/" || true)
          if [ "$DB_CHANGED" -gt 0 ] && [ "$MIGRATION_ADDED" -eq 0 ]; then
            echo "ERROR: app/models/database.py changed but no Alembic revision added"
            echo "All schema changes must be expressed as Alembic migrations following expand/contract discipline."
            echo "Run: alembic revision --autogenerate -m \"description\""
            echo "If this change does NOT alter the schema (docstring/comment only), add [skip-migration] to the commit message."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd web
          npm ci

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Copy frontend build to static/
        run: |
          mkdir -p static
          cp -r web/dist/* static/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Package deployment artifact
        run: |
          zip -r deployment-package.zip app/ static/ requirements.txt startup.sh alembic/ alembic.ini \
            --exclude "*.pyc" \
            --exclude "*/__pycache__/*"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment-package.zip
          retention-days: 30
