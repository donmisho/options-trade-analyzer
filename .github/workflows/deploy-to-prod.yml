name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type DEPLOY to confirm production deployment'
        required: true
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Validate confirm_deploy input
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "DEPLOY" ]; then
            echo "::error::confirm_deploy must equal 'DEPLOY'. Got: '${{ github.event.inputs.confirm_deploy }}'"
            exit 1
          fi
          echo "Confirm gate passed. Proceeding to deploy."

      - name: Download latest successful build artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-on-push.yml
          workflow_conclusion: success
          name: deployment-package

      - name: Unzip deployment artifact
        run: unzip deployment-package.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E4C4A364847749A6AD6322E92E0BC195 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8EE24AB74B6F4F9DB8156F19D3827F6E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5B5DBA52E1624F41AA812BFD64B8B490 }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'options-analyzer-api'
          slot-name: 'Production'
          package: .

      - name: Smoke test prod deploy
        env:
          PROD_URL: "https://options-analyzer-api.azurewebsites.net"
        run: |
          for i in {1..12}; do
            response=$(curl -s -w "\n%{http_code}" "$PROD_URL/api/v1/health/detailed")
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" = "200" ] && \
               echo "$body" | grep -q '"database":{"status":"connected"' && \
               echo "$body" | grep -q '"schwab":{"status":"connected"'; then
              echo "Smoke test passed on attempt $i"
              echo "Response: $body"
              exit 0
            fi

            echo "Attempt $i: http=$http_code, body=$body, sleeping 10s..."
            sleep 10
          done
          echo "Error: Smoke test failed after 12 attempts (~2 minutes)."
          echo "Final http_code: $http_code"
          echo "Final body: $body"
          exit 1
